    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script src="shared_utils.js"></script>
    <script>
        // ── Constants (mirrors event_display.js) ─────────────────────────────────
        const DAYS = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        const MONTHS_SHORT = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        const MONTHS_LONG = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

        const FACEBOOK_SVG = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="12" fill="#1877f2"/><path d="M16.5 8H14c-.3 0-.5.2-.5.5V10H16l-.3 2.5H13.5V19h-2.5v-6.5H9V10h2V8.5C11 6.6 12.3 5.5 14 5.5c.8 0 2.5.1 2.5.1V8z" fill="#ffffff"/></svg>';
        const GLOBE_SVG = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>';
        const EMAIL_SVG = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>';

        // ── Helpers ───────────────────────────────────────────────────────────────
        function parseDateString(s) {
            if (!s) return null;
            // New recurring-schedule object format, e.g.
            // {"type":"fortnightly","day":"monday","start":"25/05/2026"}
            if (typeof s === "object") return parseScheduleObject(s);
            if (typeof s !== "string") return null;
            const [d, m, y] = s.split("/").map(Number);
            if (!d || !m || !y) return null;
            return new Date(y, m - 1, d);
        }

        // Resolve a recurring-schedule object down to a single concrete date —
        // the next upcoming occurrence on/after today. Used wherever code needs
        // one sortable date to represent a recurring club (cutoff checks, sorting,
        // isTonight/isTomorrow, etc).
        function parseScheduleObject(schedule) {
            if (!schedule || !schedule.start) return null;
            const start = parseDate(schedule.start);
            if (!start) return null;
            const targetDay = DAY_MAP[(schedule.day || "").toLowerCase()];
            const ref = today();

            const type = (schedule.type || "").toLowerCase();

            if (type === "weekly") {
                if (targetDay === undefined) return start;
                const d = new Date(Math.max(start, ref));
                const diff = (targetDay - d.getDay() + 7) % 7;
                d.setDate(d.getDate() + diff);
                return d;
            }

            if (type === "fortnightly") {
                // Step forward in 14-day increments from the anchor "start" date
                // until we reach today or later.
                let d = new Date(start);
                if (d < ref) {
                    const daysSince = Math.floor((ref - d) / 86400000);
                    const cycles = Math.ceil(daysSince / 14);
                    d = new Date(start);
                    d.setDate(d.getDate() + cycles * 14);
                }
                return d;
            }

            if (type === "monthly") {
                const occ = OCC_MAP[(schedule.occurrence || "1st").toLowerCase()];
                if (occ === undefined || targetDay === undefined) return start;
                let d = findNthDay(ref.getFullYear(), ref.getMonth(), targetDay, occ);
                if (!d || d < ref) {
                    const nextMonth = ref.getMonth() + 1;
                    d = findNthDay(ref.getFullYear() + Math.floor(nextMonth / 12), nextMonth % 12, targetDay, occ);
                }
                return d;
            }

            // Unknown type — fall back to the anchor date itself.
            return start;
        }

        function formatDate(date) {
            return `${DAYS[date.getDay()]}, ${date.getDate()} ${MONTHS_SHORT[date.getMonth()]} ${date.getFullYear()}`;
        }

        function scheduleLabel(schedule) {
            if (!schedule) return null;

            // Handle structured schedule object
            if (typeof schedule === 'object') {
                const type = (schedule.type || '').toLowerCase();
                const day = (schedule.day || '');
                const occ = (schedule.occurrence || '');

                if (type === 'weekly' || type === 'every') {
                    return `Meets every ${capitalise(day)}`;
                }
                if (type === 'fortnightly') {
                    return `Meets fortnightly on ${capitalise(day)}s`;
                }
                if (type === 'monthly') {
                    return `Meets the ${occ} ${capitalise(day)} of the month`;
                }
                return 'Meets scheduled dates';
            }

            // Legacy string fallback
            const str = String(schedule);
            return 'Meets ' + str.charAt(0).toUpperCase() + str.slice(1);
        }

        function icon(svg, href, cls, title) {
                const a = document.createElement('a');
                a.href = href;
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                a.className = cls;

                // Tooltip for mouse users
                a.title = title;

                // Accessible name for screen readers
                a.setAttribute('aria-label', title);

                a.innerHTML = svg;
                a.style.cssText = 'display:inline-block;margin-left:6px;vertical-align:middle;text-decoration:none;';

                const svgEl = a.querySelector('svg');
                svgEl.style.cssText = 'width:20px;height:20px;';

                // Hide the raw SVG from screen readers so they only read the aria-label
                svgEl.setAttribute('aria-hidden', 'true');

                return a;
            }

        function normaliseFacebook(fb) {
            if (!fb) return null;
            return fb.startsWith('http') ? fb : `https://facebook.com/${fb}`;
        }

        // ── Shared schedule engine (used by both single-club view and directory) ──
        // Kept at module scope so renderDirectory can call it without duplication.
        const _SCHED_DAY_MAP = { sunday: 0, monday: 1, tuesday: 2, wednesday: 3, thursday: 4, friday: 5, saturday: 6 };
        const _SCHED_OCC_MAP = { '1st': 1, '2nd': 2, '3rd': 3, '4th': 4, 'last': 'last' };

        function _findNthDayInMonth(year, month, targetDay, occurrence) {
            const lastDay = new Date(year, month + 1, 0);
            if (occurrence === 'last') {
                for (let d = lastDay.getDate(); d >= 1; d--) {
                    const t = new Date(year, month, d); t.setHours(0, 0, 0, 0);
                    if (t.getDay() === targetDay) return t;
                }
            } else {
                let count = 0;
                for (let d = 1; d <= lastDay.getDate(); d++) {
                    const t = new Date(year, month, d); t.setHours(0, 0, 0, 0);
                    if (t.getDay() === targetDay && ++count === occurrence) return t;
                }
            }
            return null;
        }

        /**
         * Return all scheduled dates for a club in [from, to], respecting exceptions.
         * @param {string}   schedule   – e.g. "2nd tuesday", "every monday", "1st and 3rd wednesday"
         * @param {Date}     from       – start of window (midnight-normalised)
         * @param {Date}     to         – end of window (midnight-normalised)
         * @param {string[]} exceptions – array of DD/MM/YYYY strings to skip
         * @returns {Date[]}
         */
        function scheduledDatesInRange(schedule, from, to, exceptions) {
            if (!schedule) return [];

            // Normalise exceptions to timestamps
            const exSet = new Set((exceptions || []).map(s => {
                if (!s) return null;
                const parts = s.split('/').map(Number);
                if (parts.length !== 3) return null;
                const d = new Date(parts[2], parts[1] - 1, parts[0]);
                d.setHours(0, 0, 0, 0);
                return d.getTime();
            }).filter(Boolean));

            const results = [];
            function addIfInRange(dt) {
                if (!dt) return;
                dt.setHours(0, 0, 0, 0);
                if (dt >= from && dt <= to && !exSet.has(dt.getTime())) {
                    results.push(new Date(dt));
                }
            }

            // ── BRIDGE CODE: Handle Structured Schedule Objects ──
            if (typeof schedule === 'object') {
                const type = (schedule.type || '').toLowerCase();
                const start = parseDateString(schedule.start);
                if (!start) return [];

                const targetDay = _SCHED_DAY_MAP[(schedule.day || '').toLowerCase()];

                if (type === 'weekly' || type === 'every') {
                    if (targetDay === undefined) return [];
                    let cur = new Date(start);
                    // Sync forward to matching day of week if anchor doesn't align
                    const diff = (targetDay - cur.getDay() + 7) % 7;
                    cur.setDate(cur.getDate() + diff);

                    while (cur <= to) {
                        if (cur >= from) addIfInRange(cur);
                        cur.setDate(cur.getDate() + 7);
                    }
                }
                else if (type === 'fortnightly') {
                    let cur = new Date(start);
                    while (cur <= to) {
                        if (cur >= from) addIfInRange(cur);
                        cur.setDate(cur.getDate() + 14);
                    }
                }
                else if (type === 'monthly') {
                    const occurrence = (schedule.occurrence || '1st').toLowerCase();
                    const occNum = _SCHED_OCC_MAP[occurrence];
                    if (occNum === undefined || targetDay === undefined) return [];

                    let curMonth = new Date(from.getFullYear(), from.getMonth(), 1);
                    const endMonth = new Date(to.getFullYear(), to.getMonth(), 1);

                    while (curMonth <= endMonth) {
                        const calculatedDate = _findNthDayInMonth(curMonth.getFullYear(), curMonth.getMonth(), targetDay, occNum);
                        if (calculatedDate && calculatedDate >= start) {
                            addIfInRange(calculatedDate);
                        }
                        curMonth.setMonth(curMonth.getMonth() + 1);
                    }
                }

                return results.sort((a, b) => a - b);
            }

            // ── LEGACY STRING PARSING FALLBACKS ──
            const safeStr = String(schedule);

            // Pipe-separated alternating months
            if (safeStr.includes('|')) {
                for (const part of safeStr.split('|').map(s => s.trim())) {
                    const m = part.match(/^(.+?)\s*\((\w+)\s+months\)$/i);
                    if (!m) continue;
                    const [occ, day] = m[1].trim().toLowerCase().split(/\s+/);
                    const cond = m[2].toLowerCase();
                    const tDay = _SCHED_DAY_MAP[day];
                    const occNum = _SCHED_OCC_MAP[occ];
                    const cur = new Date(from.getFullYear(), from.getMonth() - 1, 1);
                    const end = new Date(to.getFullYear(), to.getMonth() + 1, 0);
                    while (cur <= end) {
                        const mo = cur.getMonth() + 1;
                        const ok = (cond === 'even' && mo % 2 === 0) || (cond === 'odd' && mo % 2 !== 0);
                        if (ok) {
                            addIfInRange(_findNthDayInMonth(cur.getFullYear(), cur.getMonth(), tDay, occNum));
                        }
                        cur.setMonth(cur.getMonth() + 1);
                    }
                }
                return results.sort((a, b) => a - b);
            }

            // "X and Y dayname"
            if (safeStr.toLowerCase().includes(' and ')) {
                const [occ1str, rest] = safeStr.toLowerCase().split(' and ');
                const [occ2str, dayName] = rest.trim().split(/\s+/);
                const tDay = _SCHED_DAY_MAP[dayName];
                const occ1 = _SCHED_OCC_MAP[occ1str.trim()];
                const occ2 = _SCHED_OCC_MAP[occ2str.trim()];
                const cur = new Date(from.getFullYear(), from.getMonth() - 1, 1);
                const end = new Date(to.getFullYear(), to.getMonth() + 1, 0);
                while (cur <= end) {
                    addIfInRange(_findNthDayInMonth(cur.getFullYear(), cur.getMonth(), tDay, occ1));
                    addIfInRange(_findNthDayInMonth(cur.getFullYear(), cur.getMonth(), tDay, occ2));
                    cur.setMonth(cur.getMonth() + 1);
                }
                return results.sort((a, b) => a - b);
            }

            // "every dayname"
            if (safeStr.toLowerCase().startsWith('every ')) {
                const tDay = _SCHED_DAY_MAP[safeStr.toLowerCase().replace('every ', '').trim()];
                const cur = new Date(from);
                while (cur.getDay() !== tDay) cur.setDate(cur.getDate() + 1);
                while (cur <= to) { addIfInRange(new Date(cur)); cur.setDate(cur.getDate() + 7); }
                return results;
            }

            // Standard "Nth dayname"
            const [occ, dayName] = safeStr.toLowerCase().split(/\s+/);
            const tDay = _SCHED_DAY_MAP[dayName];
            const occNum = _SCHED_OCC_MAP[occ];
            if (tDay === undefined || !occNum) return results;
            const cur = new Date(from.getFullYear(), from.getMonth() - 1, 1);
            const end = new Date(to.getFullYear(), to.getMonth() + 1, 0);
            while (cur <= end) {
                addIfInRange(_findNthDayInMonth(cur.getFullYear(), cur.getMonth(), tDay, occNum));
                cur.setMonth(cur.getMonth() + 1);
            }
            return results.sort((a, b) => a - b);
        }

        /**
         * Return the next scheduled date from today (within 6 months), or null.
         */
        function nextMeetingDate(schedule, exceptions) {
            if (!schedule) return null;
            const from = getTodayMidnight();
            const to = new Date(from); to.setMonth(to.getMonth() + 6);
            const dates = scheduledDatesInRange(schedule, from, to, exceptions || []);
            return dates.find(d => d >= from) || null;
        }

        /**
         * Return the most recent scheduled date before today (within the last
         * 3 months), or null. Companion to nextMeetingDate.
         */
        function prevMeetingDate(schedule, exceptions) {
            if (!schedule) return null;
            const today = getTodayMidnight();
            const to = new Date(today); to.setDate(to.getDate() - 1);
            const from = new Date(to); from.setMonth(from.getMonth() - 3);
            const dates = scheduledDatesInRange(schedule, from, to, exceptions || []);
            return dates.length ? dates[dates.length - 1] : null;
        }

        // ── Main ──────────────────────────────────────────────────────────────────
        (async function () {
            const params = new URLSearchParams(location.search);
            const clubId = params.get('club');

            // Load data
            const result = await loadEventsData();
            if (!result) {
                document.getElementById('page-content').innerHTML =
                    '<p class="not-found">Could not load events data.</p>';
                return;
            }
            const data = result.eventsData;

            // Find the recurring club record (events[])
            const clubRecord = data.events.find(e => e.club === clubId) || null;

            if (!clubRecord && !clubId) {
                // No club param — show a directory of all clubs
                renderDirectory(data);
                return;
            }

            if (!clubRecord) {
                document.getElementById('page-content').innerHTML =
                    `<div class="not-found"><h2>Club not found</h2><p>No club with id <code>${clubId}</code>.</p></div>`;
                return;
            }

            // Find all specific events for this club
            const today = getTodayMidnight();

            const clubSpecificEvents = data.specificEvents
                .filter(e => e.club === clubId)
                .map(e => ({ ...e, _date: parseDateString(e.date), video_trailer: e.video_trailer || null }))
                .filter(e => e._date);

            // Tour dates can opt into a club's event list via a "club_event"
            // tag on the individual tour_dates entry (e.g. a one-off tour
            // stop that's also that club's regular night). expandTourDates()
            // (shared_utils.js) flattens any array-format dates first, so a
            // multi-night stop is picked up correctly too.
            const tours = data.tours || {};
            const tourClubEvents = [];
            for (const tourKey in tours) {
                const tour = tours[tourKey];
                expandTourDates(tour.tour_dates)
                    .filter(tourDate => tourDate.club_event === clubId)
                    .forEach(tourDate => {
                        const _date = parseDateString(tourDate.date);
                        if (!_date) return;
                        tourClubEvents.push({
                            name: tour.name,
                            showname: tour.tour_name || tour.name,
                            performer_id: tour.performer_id || null,
                            venue_id: tourDate.venue_id,
                            time: tourDate.time || tour.time || null,
                            price: tourDate.price || tour.price || null,
                            description: tour.tour_description || null,
                            ticket_url: tourDate.ticket_url || null,
                            fb_event: tourDate.fb_event || null,
                            video_trailer: tourDate.video_trailer || tour.video_trailer || null,
                            isSpecial: !!tourDate.isSpecial || !!tour.isSpecial,
                            isCancelled: !!tourDate.isCancelled,
                            isSoldOut: !!tourDate.isSoldOut,
                            _date,
                        });
                    });
            }

            const allSpecific = clubSpecificEvents
                .concat(tourClubEvents)
                .sort((a, b) => a._date - b._date);

            const pastEvents = allSpecific.filter(e => e._date < today);
            const upcomingEvents = allSpecific.filter(e => e._date >= today);

            // Schedule resolution (next/prev meeting dates, date-range expansion) is
            // handled by the shared module-scope engine defined above:
            // scheduledDatesInRange(), nextMeetingDate(), prevMeetingDate().
            // (Previously this block had its own copy of that logic, which had gone
            // out of sync with the shared version and silently dropped structured
            // schedule objects like {"type":"fortnightly", ...}. Use the aliases
            // below rather than re-introducing a second copy.)
            const nextScheduledDate = nextMeetingDate;
            const prevScheduledDate = prevMeetingDate;

            // Venue lookup
            const venue = data.venues[clubRecord.venue_id] || null;

            // Performer lookup helper
            const performers = data.performers || {};
            function performerName(id) {
                return id && performers[id] ? performers[id].name : null;
            }
            function performerUrl(id) {
                return id && performers[id] ? performers[id].url || null : null;
            }

            // Resolve feature_slots for a given Date → { name, url, id } or null
            function featuredGuestForDate(date) {
                const slots = clubRecord.feature_slots;
                if (!slots || !slots.length) return null;
                const dd = String(date.getDate()).padStart(2, '0');
                const mm = String(date.getMonth() + 1).padStart(2, '0');
                const yyyy = date.getFullYear();
                const dateStr = `${dd}/${mm}/${yyyy}`;
                const slot = slots.find(s => s[0] === dateStr);
                if (!slot || !slot[1]) return null;
                const pid = slot[1];
                const rec = performers[pid];
                if (!rec) return null;
                const safeUrl = rec.url ? sanitizeUrl(rec.url) : null;
                return { id: pid, name: rec.name, url: safeUrl };
            }

            // Render a small "feat. NAME" element for a featured guest
            function featuredGuestEl(guest) {
                const div = document.createElement('div');
                div.className = 'club-featured-guest';
                div.appendChild(document.createTextNode('feat. '));
                const a = document.createElement('a');
                a.href = guest.url || `new_troubadours_performers.html?performer=${encodeURIComponent(guest.id)}`;
                if (guest.url) { a.target = '_blank'; a.rel = 'noopener noreferrer'; }
                a.textContent = guest.name;
                div.appendChild(a);
                return div;
            }

            // ── Render ─────────────────────────────────────────────────────────
            document.title = `${clubRecord.name} — New Troubadours`;

            const root = document.getElementById('page-content');
            root.innerHTML = '';

            // Header card
            const header = document.createElement('div');
            header.className = 'club-header';

            const h1 = document.createElement('h1');
            h1.textContent = clubRecord.name;
            header.appendChild(h1);

            if (clubRecord.schedule) {
                const sched = document.createElement('div');
                sched.className = 'club-schedule';
                sched.textContent = scheduleLabel(clubRecord.schedule)
                    + (clubRecord.time ? ` • ${clubRecord.time}` : '');
                header.appendChild(sched);
            }

            if (venue) {
                const vdiv = document.createElement('div');
                vdiv.className = 'club-venue';
                if (venue.url) {
                    const a = document.createElement('a');
                    a.href = venue.url; a.target = '_blank';
                    a.textContent = venue.name;
                    vdiv.appendChild(a);
                } else {
                    vdiv.textContent = venue.name;
                }
                if (venue.city) {
                    vdiv.appendChild(document.createTextNode(`, ${venue.city}`));
                }
                if (venue.postcode) {
                    vdiv.appendChild(document.createTextNode(` ${venue.postcode}`));
                }
                header.appendChild(vdiv);
            }

            if (clubRecord.price) {
                const p = document.createElement('div');
                p.style.cssText = 'margin-top:4px;font-size:14px;color:#555;';
                p.textContent = clubRecord.price;
                header.appendChild(p);
            }

            // Next meeting + featured guest — shown in header for quick visibility
            if (clubRecord.schedule) {
                const nextHeaderDate = nextScheduledDate(clubRecord.schedule, clubRecord.exceptions || []);
                if (nextHeaderDate) {
                    const msPerDay = 86400000;
                    const dDiff = Math.round((nextHeaderDate - today) / msPerDay);
                    // Only show here if not tonight/tomorrow (those get the alert banner)
                    if (dDiff > 1) {
                        const nextDiv = document.createElement('div');
                        nextDiv.className = 'club-next-meeting';
                        nextDiv.textContent = `Next meeting: ${formatDate(nextHeaderDate)}`;
                        header.appendChild(nextDiv);
                        const headerGuest = featuredGuestForDate(nextHeaderDate);
                        if (headerGuest) header.appendChild(featuredGuestEl(headerGuest));
                    } else if (dDiff >= 0) {
                        // Tonight or tomorrow — just show the featured guest under the schedule
                        const headerGuest = featuredGuestForDate(nextHeaderDate);
                        if (headerGuest) header.appendChild(featuredGuestEl(headerGuest));
                    }
                }
            }

            // Icons row
            const iconsRow = document.createElement('div');
            iconsRow.className = 'club-icons';
            if (clubRecord.link) {
                const g = icon(GLOBE_SVG, clubRecord.link, 'event-website', 'Website');
                g.querySelector('svg').style.fill = '#555';
                iconsRow.appendChild(g);
            }
            if (clubRecord.email) {
                iconsRow.appendChild(icon(EMAIL_SVG, `mailto:${clubRecord.email}`, 'event-email', 'Email'));
            }
            if (clubRecord.facebook) {
                iconsRow.appendChild(icon(FACEBOOK_SVG, normaliseFacebook(clubRecord.facebook), 'event-facebook', 'Facebook'));
            }
            if (iconsRow.children.length) header.appendChild(iconsRow);

            if (clubRecord.club_flyer) {
                const img = document.createElement('img');
                img.src = `./storyclub_assets/club_flyers/${clubRecord.club_flyer}`;
                img.className = 'club-flyer';
                img.alt = clubRecord.name;
                header.appendChild(img);
            }

            root.appendChild(header);

            // ── Tonight / tomorrow alert ───────────────────────────────────────
            // Check both next scheduled meeting AND specific upcoming events
            function makeAlert(date, label) {
                const div = document.createElement('div');
                div.className = `meeting-alert ${label === 'tonight' ? 'tonight' : 'tomorrow'}`;
                div.innerHTML = `<span class="alert-icon">${label === 'tonight' ? '🎉' : '📅'}</span>`
                    + `<span>${label === 'tonight' ? 'Meeting <strong>tonight</strong>' : 'Meeting <strong>tomorrow</strong>'}`
                    + (clubRecord.time ? ` at ${clubRecord.time}` : '')
                    + ` — ${formatDate(date)}</span>`;
                return div;
            }

            function dayDiff(a, b) {
                // Days between two midnight-normalised dates
                return Math.round((a - b) / 86400000);
            }

            const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate() + 1);

            // Check next scheduled recurring date first
            let alertDate = null;
            if (clubRecord.schedule) {
                const next = nextScheduledDate(clubRecord.schedule, clubRecord.exceptions || []);
                if (next) {
                    const diff = dayDiff(next, today);
                    if (diff === 0 || diff === 1) alertDate = { date: next, diff };
                }
            }
            // Also check if any specific upcoming event is tonight or tomorrow
            for (const ev of upcomingEvents) {
                const diff = dayDiff(ev._date, today);
                if (diff === 0 || diff === 1) {
                    // Specific event takes priority over generic schedule alert
                    alertDate = { date: ev._date, diff };
                    break;
                }
            }

            if (alertDate) {
                root.appendChild(makeAlert(alertDate.date, alertDate.diff === 0 ? 'tonight' : 'tomorrow'));
            }

            // ── Upcoming specific events ───────────────────────────────────────

            // Map rendered after upcoming events
            const latlon = venue && venue.latlon;
            function renderMap() {
                if (!latlon) return;
                const mapWrap = document.createElement('div');
                mapWrap.id = 'map-container';
                root.appendChild(mapWrap);
                const mapDiv = document.createElement('div');
                mapDiv.id = 'map';
                mapDiv.style.height = '100%';
                mapWrap.appendChild(mapDiv);
                setTimeout(() => {
                    const map = L.map('map').setView(latlon, 14);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
                    }).addTo(map);
                    const popupHtml = `<strong>${venue.name}</strong><br>${venue.full_address || venue.city || ''}`;
                    L.marker(latlon).addTo(map).bindPopup(popupHtml).openPopup();
                }, 0);
            }

            // ── Sections ──────────────────────────────────────────────────────
            function sectionHeading(text, cls) {
                const h = document.createElement('h2');
                h.className = `section-heading ${cls}`;
                h.textContent = text;
                return h;
            }

            function renderSpecificEvent(ev, isPast) {
                const card = document.createElement('div');
                card.className = 'specific-event' + (ev.isSpecial ? ' is-special' : '') + (isPast ? ' is-past' : '');

                // Show name
                const showname = document.createElement('div');
                showname.className = 'showname';
                showname.textContent = ev.showname || ev.name;
                card.appendChild(showname);

                // Performer
                const pName = performerName(ev.performer_id) || ev.performer || null;
                if (pName) {
                    const pDiv = document.createElement('div');
                    pDiv.className = 'performer';
                    const pUrl = performerUrl(ev.performer_id);
                    if (pUrl) {
                        const a = document.createElement('a');
                        a.href = pUrl; a.target = '_blank';
                        a.style.color = 'inherit';
                        a.textContent = pName;
                        pDiv.appendChild(a);
                    } else {
                        pDiv.textContent = pName;
                    }
                    card.appendChild(pDiv);
                }

                // Venue (if different from club's home venue)
                const evVenue = data.venues[ev.venue_id] || null;
                if (evVenue) {
                    const locDiv = document.createElement('div');
                    locDiv.className = 'event-location';
                    locDiv.textContent = evVenue.name + (evVenue.city ? `, ${evVenue.city}` : '') + (evVenue.postcode ? ` ${evVenue.postcode}` : '');
                    card.appendChild(locDiv);
                }

                // Date + time
                const dateDiv = document.createElement('div');
                dateDiv.className = 'event-date';
                dateDiv.textContent = formatDate(ev._date) + (ev.time ? ` • ${ev.time}` : '') + (ev.price ? ` • ${ev.price}` : '');
                card.appendChild(dateDiv);

                // Expandable: description + tickets
                const hasDesc = ev.description && ev.description.trim();
                const hasTickets = ev.ticket_url;
                const hasFbEvent = ev.fb_event;

                if (hasTickets || hasFbEvent) {
                    const tickets = document.createElement('div');
                    tickets.className = 'event-tickets';
                    if (hasTickets) {
                        const a = document.createElement('a');
                        a.href = ev.ticket_url; a.target = '_blank';
                        a.textContent = 'Tickets available here';
                        tickets.appendChild(a);
                    }
                    if (hasFbEvent) {
                        if (hasTickets) {
                            const sep = document.createElement('span');
                            sep.className = 'separator'; sep.textContent = ' | ';
                            tickets.appendChild(sep);
                        }
                        const fbUrl = `https://www.facebook.com/events/${ev.fb_event}`;
                        const fbA = document.createElement('a');
                        fbA.href = fbUrl; fbA.target = '_blank';
                        fbA.innerHTML = FACEBOOK_SVG;
                        fbA.querySelector('svg').style.cssText = 'width:20px;height:20px;vertical-align:middle;';
                        tickets.appendChild(fbA);
                    }
                    card.appendChild(tickets);
                }

                if (hasDesc) {
                    const btn = document.createElement('button');
                    btn.className = 'expand-btn';
                    btn.textContent = 'More info…';

                    const expandable = document.createElement('div');
                    expandable.className = 'expandable';

                    const desc = document.createElement('div');
                    desc.className = 'event-description';
                    desc.innerHTML = ev.description
                        .split('\n\n\n\n')
                        .map(p => p.trim())
                        .filter(Boolean)
                        .map(p => `<p>${escapeHtml(p).replace(/\n/g, '<br>')}</p>`)
                        .join('');
                    expandable.appendChild(desc);

                    btn.addEventListener('click', () => {
                        const open = expandable.classList.toggle('open');
                        btn.textContent = open ? 'Less info' : 'More info…';
                    });

                    card.appendChild(btn);
                    card.appendChild(expandable);
                }

                // Video trailer preview, if a valid YouTube URL is available
                // (getYouTubeEmbedUrl() — shared_utils.js — validates and
                // converts to a safe youtube-nocookie.com /embed/ URL, or
                // returns null for anything else).
                const videoEmbedUrl = getYouTubeEmbedUrl(ev.video_trailer);
                if (videoEmbedUrl) {
                    const videoBtn = document.createElement('button');
                    videoBtn.className = 'expand-btn';
                    videoBtn.textContent = 'Video preview';

                    const videoExpandable = document.createElement('div');
                    videoExpandable.className = 'expandable';

                    const videoWrapper = document.createElement('div');
                    videoWrapper.className = 'event-video-wrapper';

                    const iframe = document.createElement('iframe');
                    iframe.title = `${ev.showname || ev.name} trailer`;
                    iframe.frameBorder = '0';
                    iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
                    iframe.referrerPolicy = 'strict-origin-when-cross-origin';
                    iframe.allowFullscreen = true;
                    // src is only set when opened, and cleared when closed,
                    // so the trailer doesn't keep playing off-screen.

                    videoWrapper.appendChild(iframe);
                    videoExpandable.appendChild(videoWrapper);

                    videoBtn.addEventListener('click', () => {
                        const open = videoExpandable.classList.toggle('open');
                        videoBtn.textContent = open ? 'Hide video' : 'Video preview';
                        iframe.src = open ? videoEmbedUrl : '';
                    });

                    card.appendChild(videoBtn);
                    card.appendChild(videoExpandable);
                }

                return card;
            }

            // Upcoming specific events
            if (upcomingEvents.length) {
                root.appendChild(sectionHeading('Upcoming events', 'upcoming'));
                upcomingEvents.forEach(e => root.appendChild(renderSpecificEvent(e, false)));

                // Also show next regular meeting date as a reference
                if (clubRecord.schedule) {
                    const next = nextScheduledDate(clubRecord.schedule, clubRecord.exceptions || []);
                    if (next) {
                        const note = document.createElement('p');
                        note.style.cssText = 'margin:10px 0 0;color:#888;font-size:13px;font-style:italic;';
                        note.textContent = `Next regular meeting date: ${formatDate(next)}`;
                        root.appendChild(note);
                        const nextGuest = featuredGuestForDate(next);
                        if (nextGuest) root.appendChild(featuredGuestEl(nextGuest));
                    }
                }
            } else {
                root.appendChild(sectionHeading('Upcoming events', 'upcoming'));

                const schedDiv = document.createElement('div');
                schedDiv.style.cssText = 'padding:14px 0 6px;';

                const schedule = clubRecord.schedule;
                const exceptions = clubRecord.exceptions || [];

                if (schedule) {
                    const next = nextScheduledDate(schedule, exceptions);
                    const prev = prevScheduledDate(schedule, exceptions);

                    if (next) {
                        const p = document.createElement('p');
                        p.style.cssText = 'margin:0 0 6px;color:#2e7d32;font-weight:bold;';
                        p.textContent = `Next regular meeting: ${formatDate(next)}`;
                        schedDiv.appendChild(p);
                        const nextGuest = featuredGuestForDate(next);
                        if (nextGuest) schedDiv.appendChild(featuredGuestEl(nextGuest));
                    }
                    if (prev) {
                        const p = document.createElement('p');
                        p.style.cssText = 'margin:0 0 6px;color:#888;font-size:14px;';
                        p.textContent = `Previous regular meeting: ${formatDate(prev)}`;
                        schedDiv.appendChild(p);
                    }
                    if (!next && !prev) {
                        const p = document.createElement('p');
                        p.className = 'no-events';
                        p.textContent = 'No scheduled dates found in the near future.';
                        schedDiv.appendChild(p);
                    }
                } else {
                    const p = document.createElement('p');
                    p.className = 'no-events';
                    p.textContent = 'No specific upcoming events listed.';
                    schedDiv.appendChild(p);
                }

                root.appendChild(schedDiv);
            }

            // ── Feature slots ──────────────────────────────────────────────────
            const slots = clubRecord.feature_slots;
            if (slots && slots.length) {
                // Parse and sort all slots by date
                const parsedSlots = slots
                    .map(s => {
                        const date = parseDateString(s[0]);
                        return date ? { date, performerId: s[1] } : null;
                    })
                    .filter(Boolean)
                    .sort((a, b) => a.date - b.date);

                // Deduplicate: same date + performer combination
                const seen = new Set();
                const uniqueSlots = parsedSlots.filter(s => {
                    const key = s.date.getTime() + '|' + s.performerId;
                    if (seen.has(key)) return false;
                    seen.add(key);
                    return true;
                });

                if (uniqueSlots.length) {
                    root.appendChild(sectionHeading('Featured guests', 'upcoming'));

                    uniqueSlots.forEach(({ date, performerId }) => {
                        const isPast = date < today;
                        const row = document.createElement('div');
                        row.className = 'feature-slot' + (isPast ? ' is-past' : '');

                        const dateEl = document.createElement('div');
                        dateEl.className = 'feature-slot-date';
                        dateEl.textContent = formatDate(date);
                        row.appendChild(dateEl);

                        const perfEl = document.createElement('div');
                        perfEl.className = 'feature-slot-performer';

                        const rec = performers[performerId];
                        if (rec) {
                            const safeUrl = rec.url ? sanitizeUrl(rec.url) : null;
                            const perfUrl = safeUrl || `new_troubadours_performers.html?performer=${encodeURIComponent(performerId)}`;
                            const a = document.createElement('a');
                            a.href = perfUrl;
                            if (safeUrl) { a.target = '_blank'; a.rel = 'noopener noreferrer'; }
                            a.textContent = rec.name;
                            perfEl.appendChild(a);
                        } else {
                            // Performer id not in data — show the raw id as a fallback
                            perfEl.textContent = performerId;
                        }

                        row.appendChild(perfEl);
                        root.appendChild(row);
                    });
                }
            }

            // Past specific events (most recent first)
            renderMap();

            if (pastEvents.length) {
                root.appendChild(sectionHeading('Past events', 'past'));
                [...pastEvents].reverse().forEach(e => root.appendChild(renderSpecificEvent(e, true)));
            }

        })();

        // ── Directory (no club= param) ────────────────────────────────────────────
        async function renderDirectory(data) {
            document.title = 'Story Clubs — New Troubadours';
            const root = document.getElementById('page-content');
            root.innerHTML = '';

            const DAYS_ORDER = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];

            const clubs = data.events.filter(e => e.club);

            // ── Parse day and week from schedule string ──────────────────────────
            function clubDay(c) {
                if (!c || !c.schedule) return null;

                // Handle structured schedule object
                if (typeof c.schedule === 'object') {
                    const dStr = (c.schedule.day || '').toLowerCase();
                    return DAYS_ORDER.find(d => d.toLowerCase() === dStr) || null;
                }

                // Legacy fallback string check
                const lower = String(c.schedule).toLowerCase();
                return DAYS_ORDER.find(d => lower.includes(d.toLowerCase())) || null;
            }

            function clubWeeks(c) {
                if (!c || !c.schedule) return [];

                // Handle structured schedule object
                if (typeof c.schedule === 'object') {
                    const type = (c.schedule.type || '').toLowerCase();
                    if (type === 'every' || type === 'weekly' || type === 'fortnightly') {
                        return ['every'];
                    }
                    if (type === 'monthly') {
                        return [(c.schedule.occurrence || '1st').toLowerCase()];
                    }
                    return [];
                }

                // Legacy fallback string check
                const lower = String(c.schedule).toLowerCase();
                if (lower.startsWith('every')) return ['every'];
                return ['1st', '2nd', '3rd', '4th', 'last'].filter(w => lower.includes(w));
            }

            // Resolve a feature slot for a given club record + Date
            function dirFeaturedGuest(c, date) {
                const slots = c.feature_slots;
                if (!slots || !slots.length || !date) return null;
                const dd = String(date.getDate()).padStart(2, '0');
                const mm = String(date.getMonth() + 1).padStart(2, '0');
                const yyyy = date.getFullYear();
                const dateStr = `${dd}/${mm}/${yyyy}`;
                const slot = slots.find(s => s[0] === dateStr);
                if (!slot || !slot[1]) return null;
                const rec = data.performers[slot[1]];
                return rec ? rec.name : null;
            }

            // Sort: day order → week ordinal → name
            const WEEK_IDX = { 'every': -1, '1st': 0, '2nd': 1, '3rd': 2, '4th': 3, 'last': 4 };
            clubs.sort((a, b) => {
                const da = DAYS_ORDER.indexOf(clubDay(a)); const db = DAYS_ORDER.indexOf(clubDay(b));
                if (da !== db) return (da < 0 ? 99 : da) - (db < 0 ? 99 : db);
                const wa = Math.min(...(clubWeeks(a).map(w => WEEK_IDX[w] ?? 99)));
                const wb = Math.min(...(clubWeeks(b).map(w => WEEK_IDX[w] ?? 99)));
                if (wa !== wb) return wa - wb;
                return a.name.localeCompare(b.name);
            });

            // ── Filter state ─────────────────────────────────────────────────────
            let activeDay = null;   // null = All
            let activeWeek = null;  // null = All
            let activePeriod = null; // null | 'today' | 'week' | 'weekend' | '7days'
            let searchTerm = '';

            // Build search index: { c, searchText, nextMeeting }
            // nextMeeting is pre-computed once (Date or null) for badge + period filtering
            const today = getTodayMidnight();
            const clubIndex = clubs.map(c => {
                const venue = data.venues[c.venue_id] || {};
                const parts = [c.name, venue.name, venue.city, venue.full_address, c.location].filter(Boolean);
                return {
                    c,
                    searchText: parts.join(' ').toLowerCase(),
                    nextMeeting: nextMeetingDate(c.schedule, c.exceptions),
                };
            });

            var isVisible = function (entry) {
                const { c } = entry;
                if (activeDay && clubDay(c) !== activeDay) return false;
                if (activeWeek) {
                    const weeks = clubWeeks(c);
                    if (!weeks.includes(activeWeek)) return false;
                }
                if (searchTerm && !entry.searchText.includes(searchTerm.toLowerCase())) return false;
                if (activePeriod) {
                    // Compute the window for the chosen period
                    const from = new Date(today);
                    const to = new Date(today);
                    if (activePeriod === 'today') {
                        // to stays = today
                    } else if (activePeriod === 'week') {
                        // Rest of this calendar week (Mon–Sun). Find Sunday.
                        const dayOfWeek = today.getDay(); // 0=Sun,6=Sat
                        const daysToSunday = dayOfWeek === 0 ? 0 : 7 - dayOfWeek;
                        to.setDate(to.getDate() + daysToSunday);
                    } else if (activePeriod === 'weekend') {
                        // Next Saturday and Sunday
                        const dow = today.getDay();
                        const daysToSat = dow === 6 ? 0 : (6 - dow + 7) % 7 || 7;
                        to.setDate(to.getDate() + daysToSat + 1); // through Sunday
                        from.setDate(from.getDate() + (daysToSat === 0 ? 0 : daysToSat));
                    } else if (activePeriod === '7days') {
                        to.setDate(to.getDate() + 6);
                    }
                    const dates = scheduledDatesInRange(c.schedule, from, to, c.exceptions || []);
                    if (dates.length === 0) return false;
                }
                return true;
            };

            // ── Page title ───────────────────────────────────────────────────────
            const h1 = document.createElement('h1');
            h1.textContent = 'Story Clubs';
            root.appendChild(h1);

            // ── Collapsible map ──────────────────────────────────────────────────
            // mapHandle.map is null until the user opens the panel for the first time.
            let dirMap = null;
            let mapBoundsFilter = false; // true = restrict list to current map viewport
            const activeMarkers = []; // L.circleMarker instances currently on the map

            // (Re)draw markers for every club that passes isVisible().
            // Also, when mapBoundsFilter is on, only keep clubs whose venue
            // falls inside the current map viewport.
            function renderMapMarkers() {
                if (!dirMap) return;
                activeMarkers.forEach(m => m.remove());
                activeMarkers.length = 0;
                // Use clubIndex so we can call isVisible (which handles day/week/search/bounds)
                // Always show markers for all filter-passing clubs regardless of mapBoundsFilter
                // (the list hides non-visible ones; the map shows them as context when filter is off)
                clubIndex.forEach(entry => {
                    const { c } = entry;
                    const venue = data.venues[c.venue_id];
                    if (!venue || !venue.latlon || venue.latlon.length === 0) return;
                    // Only suppress marker if day/week/search filters exclude it
                    // (when mapBoundsFilter is on, isVisible also checks bounds — that's fine)
                    if (!isVisible(entry)) return;
                    const popup = `<strong>${c.name}</strong><br>${venue.name}${venue.city ? ', ' + venue.city : ''}<br><em>${c.schedule || ''}</em>`;
                    const marker = L.circleMarker(venue.latlon, { radius: 7, fillColor: '#4CAF50', color: '#2e7d32', weight: 2, fillOpacity: 0.85 })
                        .addTo(dirMap).bindPopup(popup);
                    marker.on('click', () => {
                        const card = document.getElementById('club-card-' + c.club);
                        if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    });
                    activeMarkers.push(marker);
                });
            }

            const mapHandle = createCollapsibleMap(root, 'dir-map', 'Show map of all clubs', 360, map => {
                dirMap = map;

                // Wire map movement → re-filter list when bounds filter is active
                map.on('moveend zoomend', () => {
                    if (mapBoundsFilter) {
                        renderList();        // list respects bounds via isVisible extension below
                        renderMapMarkers();  // redraw markers for new viewport
                    }
                });

                renderMapMarkers(); // initial paint
            });

            // Extend isVisible to optionally respect map bounds.
            // We wrap the existing isVisible function, capturing it first.
            const _isVisibleBase = isVisible;
            isVisible = function (entry) {
                if (!_isVisibleBase(entry)) return false;
                if (mapBoundsFilter && dirMap) {
                    const venue = data.venues[entry.c.venue_id];
                    if (!venue || !venue.latlon || venue.latlon.length === 0) return false;
                    if (!dirMap.getBounds().contains(venue.latlon)) return false;
                }
                return true;
            };

            // ── Filter controls ──────────────────────────────────────────────────
            const controls = document.createElement('div');
            controls.className = 'dir-controls';

            // ── "What's on" period quick-filter row ──────────────────────────────
            const periodRow = document.createElement('div');
            periodRow.className = 'period-filter-row';

            const periodLabel = document.createElement('span');
            periodLabel.className = 'period-filter-label';
            periodLabel.textContent = "What's on:";
            periodRow.appendChild(periodLabel);

            let periodBtnEls = [];
            function refreshPeriodBtns() {
                periodBtnEls.forEach(b => b.classList.toggle('active', b.dataset.period === (activePeriod || '')));
            }

            [
                { label: 'All dates', value: null },
                { label: 'Today', value: 'today' },
                { label: 'This week', value: 'week' },
                { label: 'This weekend', value: 'weekend' },
                { label: 'Next 7 days', value: '7days' },
            ].forEach(({ label, value }) => {
                const btn = document.createElement('button');
                btn.textContent = label;
                btn.className = 'period-btn' + (value === activePeriod ? ' active' : '');
                btn.dataset.period = value || '';
                btn.addEventListener('click', () => {
                    activePeriod = (activePeriod === value) ? null : value;
                    // Period filter and day/week filters are complementary; clear
                    // day/week when switching to a period so results aren't empty.
                    if (activePeriod) { activeDay = null; activeWeek = null; refreshDayBtns(); refreshWeekBtns(); }
                    refreshPeriodBtns();
                    renderList();
                });
                periodRow.appendChild(btn);
                periodBtnEls.push(btn);
            });
            controls.appendChild(periodRow);

            // Two-column button grid
            const filterGrid = document.createElement('div');
            filterGrid.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:12px 24px;margin-bottom:14px;';

            // Day buttons
            const dayGroup = document.createElement('div');
            const dayLabel = document.createElement('div');
            dayLabel.className = 'dir-filter-label';
            dayLabel.textContent = 'Day of week';
            dayGroup.appendChild(dayLabel);
            const dayBtns = document.createElement('div');
            dayBtns.className = 'dir-filter-btns';

            function makeDayBtn(label, value) {
                const btn = document.createElement('button');
                btn.textContent = label;
                btn.className = 'dir-filter-btn' + (value === activeDay ? ' active-green' : '');
                btn.addEventListener('click', () => {
                    activeDay = (activeDay === value) ? null : value;
                    refreshDayBtns();
                    renderList();
                });
                return btn;
            }
            let dayBtnEls = [];
            function refreshDayBtns() {
                dayBtnEls.forEach((btn, i) => {
                    const val = i === 0 ? null : DAYS_ORDER[i - 1];
                    btn.classList.toggle('active-green', activeDay === val);
                });
            }
            // All button first, then Mon-Sun abbreviated
            const allDayBtn = makeDayBtn('All', null);
            dayBtns.appendChild(allDayBtn);
            dayBtnEls.push(allDayBtn);
            DAYS_ORDER.forEach(d => {
                const btn = makeDayBtn(d.slice(0, 3), d);
                dayBtns.appendChild(btn);
                dayBtnEls.push(btn);
            });
            dayGroup.appendChild(dayBtns);
            filterGrid.appendChild(dayGroup);

            // Week buttons
            const weekGroup = document.createElement('div');
            const weekLabel = document.createElement('div');
            weekLabel.className = 'dir-filter-label';
            weekLabel.textContent = 'Week of month';
            weekGroup.appendChild(weekLabel);
            const weekBtns = document.createElement('div');
            weekBtns.className = 'dir-filter-btns';

            const WEEK_DISPLAY = ['All', 'Every', '1st', '2nd', '3rd', '4th', 'Last'];
            const WEEK_VALUES = [null, 'every', '1st', '2nd', '3rd', '4th', 'last'];
            let weekBtnEls = [];
            function refreshWeekBtns() {
                weekBtnEls.forEach((btn, i) => {
                    btn.classList.toggle('active-teal', activeWeek === WEEK_VALUES[i]);
                });
            }
            WEEK_DISPLAY.forEach((label, i) => {
                const val = WEEK_VALUES[i];
                const btn = document.createElement('button');
                btn.textContent = label;
                btn.className = 'dir-filter-btn';
                btn.addEventListener('click', () => {
                    activeWeek = (activeWeek === val) ? null : val;
                    refreshWeekBtns();
                    renderList();
                });
                weekBtns.appendChild(btn);
                weekBtnEls.push(btn);
            });
            weekGroup.appendChild(weekBtns);
            filterGrid.appendChild(weekGroup);

            controls.appendChild(filterGrid);

            // ── "Filter by map" toggle ───────────────────────────────────────────
            const mapFilterRow = document.createElement('div');
            mapFilterRow.style.cssText = 'margin-bottom:10px;display:flex;align-items:center;gap:8px;';
            const mapFilterBtn = document.createElement('button');
            mapFilterBtn.textContent = '🗺 Filter by map view';
            mapFilterBtn.className = 'dir-filter-btn';
            mapFilterBtn.title = 'When active, only clubs whose venue is visible on the map are shown. Pan or zoom the map to update the list.';
            mapFilterBtn.style.cssText = 'font-size:13px;padding:5px 12px;';
            mapFilterBtn.addEventListener('click', () => {
                mapBoundsFilter = !mapBoundsFilter;
                mapFilterBtn.classList.toggle('active-green', mapBoundsFilter);
                mapFilterHint.style.display = mapBoundsFilter ? 'inline' : 'none';
                // Open the map panel automatically when the filter is turned on
                if (mapBoundsFilter && mapHandle.details && !mapHandle.details.open) {
                    mapHandle.details.open = true;
                }
                renderList();
                renderMapMarkers();
            });
            const mapFilterHint = document.createElement('span');
            mapFilterHint.style.cssText = 'font-size:12px;color:#888;display:none;font-style:italic;';
            mapFilterHint.textContent = 'Pan / zoom the map to filter clubs';
            mapFilterRow.appendChild(mapFilterBtn);
            mapFilterRow.appendChild(mapFilterHint);
            controls.appendChild(mapFilterRow);

            // ── Search box with dropdown suggestions ────────────────────────────
            createSearchBox(controls, {
                placeholder: 'Search clubs by name, venue or location…',
                search: term => clubIndex.filter(e => e.searchText.includes(term)).slice(0, 8),
                renderItem: ({ c }) => {
                    const venue = data.venues[c.venue_id] || {};
                    const item = document.createElement('div');
                    const strong = document.createElement('strong');
                    strong.textContent = c.name;
                    item.appendChild(strong);
                    if (venue.city) {
                        const city = document.createElement('span');
                        city.className = 'dir-search-item-meta';
                        city.textContent = venue.city;
                        item.appendChild(city);
                    }
                    return item;
                },
                onSelect: ({ c }, searchInput, clearBtn, dropdown) => {
                    searchInput.value = c.name;
                    searchTerm = c.name;
                    clearBtn.style.display = 'block';
                    dropdown.style.display = 'none';
                    renderList();
                    setTimeout(() => {
                        const el = document.getElementById('club-card-' + c.club);
                        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 80);
                },
                onChange: term => { searchTerm = term; renderList(); }
            });

            root.appendChild(controls);

            // ── Result count line ────────────────────────────────────────────────
            const countLine = document.createElement('p');
            countLine.style.cssText = 'font-size:13px;color:#888;margin:0 0 8px 4px;';
            root.appendChild(countLine);

            // ── Club list container ──────────────────────────────────────────────
            const listWrap = document.createElement('div');
            root.appendChild(listWrap);

            // ── Badge helpers ────────────────────────────────────────────────────
            function nextMeetingBadge(nextDate) {
                if (!nextDate) return null;
                const msPerDay = 86400000;
                const diffDays = Math.round((nextDate - today) / msPerDay);
                let cls, label;
                if (diffDays === 0) {
                    cls = 'today'; label = '🔴 Tonight';
                } else if (diffDays === 1) {
                    cls = 'tomorrow'; label = '🟠 Tomorrow';
                } else if (diffDays <= 6) {
                    cls = 'thisweek';
                    label = '🟢 ' + DAYS[nextDate.getDay()] + ' ' + nextDate.getDate() + ' ' + MONTHS_SHORT[nextDate.getMonth()];
                } else if (diffDays <= 13) {
                    cls = 'nextweek';
                    label = DAYS[nextDate.getDay()] + ' ' + nextDate.getDate() + ' ' + MONTHS_SHORT[nextDate.getMonth()];
                } else {
                    return null; // .later is display:none, skip building element
                }
                const badge = document.createElement('div');
                badge.className = 'next-meeting-badge ' + cls;
                badge.textContent = label;
                return badge;
            }

            // ── Render function ──────────────────────────────────────────────────
            function renderList() {
                renderMapMarkers(); // keep map in sync with current filters
                listWrap.innerHTML = '';

                let visible = clubIndex.filter(isVisible);
                const total = clubIndex.length;
                countLine.textContent = visible.length === total
                    ? `${total} clubs`
                    : `${visible.length} of ${total} clubs`;

                if (visible.length === 0) {
                    const p = document.createElement('p');
                    p.style.cssText = 'text-align:center;color:#aaa;padding:30px;font-style:italic;';
                    p.textContent = 'No clubs match the current filters.';
                    listWrap.appendChild(p);
                    return;
                }

                // When a period filter is active: sort by next meeting date ascending,
                // suppress day-of-week headings (chronological order is more useful).
                if (activePeriod) {
                    visible = [...visible].sort((a, b) => {
                        const am = a.nextMeeting ? a.nextMeeting.getTime() : Infinity;
                        const bm = b.nextMeeting ? b.nextMeeting.getTime() : Infinity;
                        return am - bm;
                    });
                }

                let currentDay = null;
                visible.forEach((entry) => {
                    const { c } = entry;
                    const venue = data.venues[c.venue_id];
                    const day = clubDay(c);

                    // Day headings: show only when no period or day filter is narrowing things down
                    if (!activePeriod && !activeDay && day !== currentDay) {
                        currentDay = day;
                        const h2 = document.createElement('h2');
                        h2.style.cssText = 'font-size:14px;font-weight:bold;color:#2e7d32;margin:20px 0 8px;padding-bottom:4px;border-bottom:2px solid #c8e6c9;';
                        h2.textContent = day ? day + 's' : 'Variable / irregular';
                        listWrap.appendChild(h2);
                    }

                    const card = document.createElement('div');
                    card.className = 'event';
                    card.id = 'club-card-' + c.club;
                    card.style.cursor = 'pointer';
                    card.onclick = () => location.href = `new_troubadours_storyclub.html?club=${c.club}`;

                    const name = document.createElement('div');
                    name.className = 'event-name';
                    name.textContent = c.name;
                    card.appendChild(name);

                    // Next-meeting badge (shown when meeting is within ~2 weeks)
                    const badge = nextMeetingBadge(entry.nextMeeting);
                    if (badge) card.appendChild(badge);

                    if (c.schedule) {
                        const s = document.createElement('div');
                        s.className = 'event-date';

                        // Cleanly uses our unified labelling helper safely
                        s.textContent = scheduleLabel(c.schedule) + (c.time ? ' \u2022 ' + c.time : '');

                        card.appendChild(s);
                    }

                    // Featured guest for the next meeting date
                    const dirGuest = dirFeaturedGuest(c, entry.nextMeeting);
                    if (dirGuest) {
                        const featDiv = document.createElement('div');
                        featDiv.className = 'club-dir-featured-guest';
                        featDiv.textContent = `feat. ${dirGuest}`;
                        card.appendChild(featDiv);
                    }

                    if (venue) {
                        const loc = document.createElement('div');
                        loc.className = 'event-location';
                        loc.textContent = venue.name + (venue.city ? `, ${venue.city}` : '');
                        card.appendChild(loc);
                    } else if (c.location) {
                        const loc = document.createElement('div');
                        loc.className = 'event-location';
                        loc.textContent = c.location;
                        card.appendChild(loc);
                    }

                    const meta = document.createElement('div');
                    meta.style.cssText = 'display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:6px;';
                    const linkSrc = c.link || c.website || c.tickets_url;
                    if (linkSrc) {
                        const a = icon(GLOBE_SVG, linkSrc, 'event-website', 'Website');
                        // Match the grey color used in the single-club header
                        a.querySelector('svg').style.fill = '#555';
                        a.onclick = e => e.stopPropagation();
                        meta.appendChild(a);
                    }
                    if (c.facebook) {
                        const fbHref = c.facebook.startsWith('http') ? c.facebook : `https://facebook.com/${c.facebook}`;
                        const a = icon(FACEBOOK_SVG, fbHref, 'event-facebook', 'Facebook');
                        a.onclick = e => e.stopPropagation(); // Keep this so clicking the link doesn't open the club card
                        meta.appendChild(a);
                    }
                    if (c.email) {
                        const a = icon(EMAIL_SVG, `mailto:${c.email}`, 'event-email', 'Email');
                        a.onclick = e => e.stopPropagation();
                        meta.appendChild(a);
                    }
                    if (meta.childNodes.length) card.appendChild(meta);

                    listWrap.appendChild(card);
                });
            }

            // Initial render
            refreshDayBtns();
            refreshWeekBtns();
            refreshPeriodBtns();
            renderList();
        }
    </script>
</body>

</html>
